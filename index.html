<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>Study Finder</title>

<!-- Noto Sans -->
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">

<style>

/* ================= GLOBAL ================= */
body {
  font-family: 'Noto Sans', sans-serif;
  background: #f8fafc;
  margin: 0;
  padding: 20px;
  color: #111827;
}

/* ================= HEADER ================= */
.header {
  display: flex;
  align-items: center;
  gap: 20px;
}

.title {
  font-size: 26px;
  font-weight: 700;
}

/* ================= SEARCH ================= */
.search-container {
  flex: 1;
  position: relative;
}

.search-input {
  width: 100%;
  padding: 14px 50px 14px 16px;
  border-radius: 999px;
  border: 1px solid #e5e7eb;
  font-size: 14px;
}

/* FIXED search icon */
.search-button {
  position: absolute;
  right: 8px;
  top: 50%;
  transform: translateY(-50%);
  background: #3b82f6;
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  color: white;
  cursor: pointer;
}

/* ================= LAYOUT ================= */
.container {
  display: flex;
  margin-top: 20px;
  gap: 20px;
}

/* ================= FILTER ================= */
.sidebar {
  width: 260px;
}

.filter-box {
  background: white;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 16px;
  border: 1px solid #e5e7eb;
}

.filter-title {
  font-weight: 600;
  margin-bottom: 10px;
}

/* ================= CONTENT ================= */
.content {
  flex: 1;
}

/* ================= STUDY CARD ================= */
.study-card {
  background: white;
  border-radius: 12px;
  padding: 18px;
  border: 1px solid #e5e7eb;
  margin-bottom: 16px;
}

/* ================= TAGS ================= */
.tag {
  display: inline-block;
  padding: 6px 10px;
  border-radius: 10px;
  font-size: 12px;
  font-weight: 500;
  margin-right: 6px;
}

.tag-green {
  background: #e6f4ea;
  color: #1e7a3e;
}

.tag-purple {
  background: #f3e8ff;
  color: #7c3aed;
}

/* ================= FEATURED BADGE ================= */
.featured-badge {
  background: white;
  color: #7c3aed;
  border: 1.5px solid #7c3aed;
  border-radius: 12px;
  padding: 6px 12px;
  font-weight: 600;
  font-size: 13px;
  float: right;
}

/* ================= CONDITIONS ================= */
.conditions {
  margin-top: 10px;
}

.condition-chip {
  display: inline-block;
  background: #f3f4f6;
  padding: 6px 10px;
  border-radius: 10px;
  margin-right: 6px;
  font-size: 13px;
}

/* ================= FOOTER ================= */
.meta {
  display: flex;
  justify-content: space-between;
  margin-top: 12px;
  font-size: 12px;
  color: #6b7280;
}

</style>
</head>

<body>

<!-- HEADER -->
<div class="header">
  <div class="title">Study Finder</div>

  <div class="search-container">
    <input class="search-input" placeholder="Search study details..." />
    <button class="search-button">🔍</button>
  </div>
</div>

<div class="container">

  <!-- FILTER SIDEBAR -->
  <div class="sidebar">

    <div class="filter-box">
      <div class="filter-title">Condition</div>
      <input placeholder="Enter condition/diagnosis" style="width:100%; padding:10px; border-radius:8px; border:1px solid #e5e7eb;" />
    </div>

    <div class="filter-box">
      <div class="filter-title">Location</div>
      <input placeholder="Enter full state/province name" style="width:100%; padding:10px; border-radius:8px; border:1px solid #e5e7eb;" />
    </div>

    <div class="filter-box">
      <div class="filter-title">Study Type</div>
      <label><input type="checkbox"/> Interventional</label><br/>
      <label><input type="checkbox"/> Observational</label>
    </div>

  </div>

  <!-- CONTENT -->
  <div class="content">

    <div style="margin-bottom:10px;">
      Showing <b>1 to 10</b> of <b>19 Studies</b>
    </div>

    <!-- CARD -->
    <div class="study-card">

      <div>
        <span class="tag tag-green">Recruiting</span>
        <span class="tag tag-purple">Interventional</span>
        <span class="featured-badge">★ Featured</span>
      </div>

      <h3 style="margin-top:10px;">
        Imaging for Glioma Diagnosis and Management
      </h3>

      <div style="margin-top:6px;">
        Age: <b>3 Years and older</b>
      </div>

      <div class="conditions">
        <span class="condition-chip">Glioma (Any Grade) in the Brain</span>
      </div>

      <div class="meta">
        <div>AI-Simplified ✨</div>
        <div>NCT06743100</div>
      </div>

    </div>

  </div>

</div>

</body>
</html>
