<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>WeTrials – Study Finder</title>

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <!-- ✅ YOUR CSS FILE -->
  <link rel="stylesheet" href="studyfinder-styles.css">
</head>

<body>

<!-- TOAST -->
<div class="toast-wrap" id="toastWrap"></div>

<!-- HEADER -->
<div class="header">
  <div class="sf-pill">
    <div class="sf-pill-l">
      <div class="sf-icon">🔍</div>
      <span class="sf-name">Study Finder</span>
    </div>
  </div>

  <div class="search-wrap">
    <input class="srch" id="searchInput" type="text" placeholder="Search study details…">
    <button class="srch-btn">Search</button>
  </div>
</div>

<!-- MAIN LAYOUT -->
<div class="layout">

  <!-- FILTER PANEL -->
  <div class="fp">
    <div class="fp-hdr">Filter</div>

    <input class="fi" id="conditionFilter" type="text" placeholder="Condition">

    <div class="fs">
      <div class="fs-title">Study Type</div>
      <label class="cr"><input type="checkbox"> Interventional</label>
      <label class="cr"><input type="checkbox"> Observational</label>
    </div>

    <div class="fa">
      <button class="btn-c">Clear</button>
      <button class="btn-a">Apply</button>
    </div>
  </div>

  <!-- MAIN CONTENT -->
  <div class="main">

    <div class="res-info">
      Showing <strong>0</strong> results
    </div>

    <div class="card-list" id="cardList">
      <!-- Cards will render here -->
    </div>

  </div>
</div>

<script>
console.log("Study Finder Loaded");

// Example test render
const container = document.getElementById("cardList");

container.innerHTML = `
  <div class="card">
    <div class="card-title">Sample Study</div>
    <div class="card-desc">This is a test study to verify layout works.</div>
  </div>
`;
</script>

</body>
</html>
